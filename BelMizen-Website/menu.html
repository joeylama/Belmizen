<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Menu | Bel Mizen</title>

  <style>
    :root {
      --bg-black: #000000; 
      --primary-gold: #cf9b16; 
      --whatsapp-green: #25D366;
      --text-on-dark: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-black);
      color: var(--text-on-dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    #progressBar {
      position: fixed;
      top: 0; left: 0; width: 0%; height: 5px;
      background: linear-gradient(to right, var(--primary-gold), #ffffff);
      z-index: 2000;
    }

    header {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    nav { max-width: 1200px; margin: auto; display: flex; justify-content: center; }
    .menu { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; }
    
    .menu a { 
      font-weight: bold; 
      font-size: 0.9rem; 
      text-decoration: none; 
      color: #ffffff; 
      transition: 0.3s; 
      text-transform: uppercase;
      position: relative;
    }
    
    .menu a:hover { color: var(--primary-gold); }

    .wa-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--whatsapp-green);
      color: white !important;
      padding: 8px 18px;
      border-radius: 50px;
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }

    .category-bar {
      position: sticky;
      top: 66px; 
      background: rgba(10, 10, 10, 0.95);
      z-index: 900;
      padding: 15px 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--primary-gold);
      flex-wrap: wrap;
    }
    .category-bar a {
      color: #999;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 8px 16px;
      border: 1px solid rgba(207, 155, 22, 0.2);
      border-radius: 50px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-weight: 600;
    }
    .category-bar a.active { 
      background: var(--primary-gold); 
      color: black; 
      border-color: var(--primary-gold);
      font-weight: 900;
    }

    .menu-hero {
      padding: 60px 20px;
      text-align: center;
      background: #000;
    }

    .logo-container {
      position: relative;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 40%, transparent 70%);
      padding: 40px;
      border-radius: 50%;
      display: inline-block;
    }
    .menu-hero-logo { 
      max-width: 400px;
      width: 100%;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); 
    }

    .container { width: min(1000px, 94%); margin: auto; padding-bottom: 80px; }
    
    section { 
      margin-bottom: 80px; 
      scroll-margin-top: 180px; 
      text-align: center; 
      display: flex;
      justify-content: center;
    }

    .menu-visual {
      width: 75%;
      border-radius: 20px;
      border-top: 4px solid var(--primary-gold);
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      transition: all 0.6s ease;
      filter: brightness(0.8);
    }

    @keyframes sequentialGlow {
      0% { filter: brightness(0.8); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
      50% { filter: brightness(1.2); box-shadow: 0 0 45px var(--primary-gold); transform: scale(1.01); }
      100% { filter: brightness(0.9); box-shadow: 0 10px 25px rgba(207, 155, 22, 0.3); }
    }

    .reveal.visible .menu-visual {
      animation: sequentialGlow 2.5s ease-in-out forwards;
    }

    .menu-visual:hover {
      filter: brightness(1.1) !important;
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 35px var(--primary-gold);
    }

    .wa-float {
      position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
      background: var(--whatsapp-green); border-radius: 50%; display: flex; 
      justify-content: center; align-items: center; z-index: 2000;
      transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .wa-float:hover { transform: scale(1.1) rotate(10deg); }

    footer { padding: 60px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: white; }

    .reveal { opacity: 1; transform: translateY(30px); transition: 0.8s ease-out; }
    .reveal.visible { transform: translateY(0); }
  </style>
</head>

<body>

<div id="progressBar"></div>

<header id="siteHeader">
  <nav>
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="menu.html" style="color: var(--primary-gold);">Menu</a>
      <a href="offers.html">Offers</a> <a href="index.html#social">Social Media</a>
      <a href="gallery.html">Gallery</a>
      <a href="index.html#location">Location</a>
      <a href="contacts.html">Contacts</a>
      <a href="https://wa.me/96176191914" class="wa-nav-btn" target="_blank">
        <span>Whatsapp Orders</span>

    </div>
  </nav>
</header>

<div class="category-bar" id="categoryBar">

  <a href="#platters">Platters</a>

  <a href="#crepes">Crêpes</a>
  <a href="#desserts">Desserts</a>
  <a href="#drinks">Drinks</a>
  <a href="#arguileh">Arguileh</a>
</div>

<div class="menu-hero">

    <img class="menu-hero-logo" src="BEL MIZEN LOGO FINAL.png" alt="Bel Mizen">

<div class="container">

    <img src="Sandwiches.png" class="menu-visual" alt="Sandwiches">

  </section>

  <section id="salads" class="reveal" style="transition-delay: 0.4s;">

  </section>

  <section id="crepes" class="reveal" style="transition-delay: 0.6s;">
    <img src="Crepe.png" class="menu-visual" alt="Crêpes">
  </section>

  <section id="desserts" class="reveal" style="transition-delay: 0.8s;">
    <img src="Desserts.png" class="menu-visual" alt="Desserts">
  </section>

  <section id="drinks" class="reveal" style="transition-delay: 1.0s;">
    <img src="Drinks.png" class="menu-visual" alt="Drinks">
  </section>

  <section id="arguileh" class="reveal" style="transition-delay: 1.2s;">
    <img src="Arguileh.png" class="menu-visual" alt="Arguileh">
  </section>
</div>

<footer>
  <p>© 2026 Bel Mizen — بالميزان و عالغرام</p>
</footer>

<script>
  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById('progressBar').style.width = (winScroll / height) * 100 + "%";
  });

  const sections = document.querySelectorAll('section');
  const navLinks = document.querySelectorAll('.category-bar a');

  window.addEventListener('scroll', () => {
    let current = "";
    sections.forEach(section => {
      const sectionTop = section.offsetTop;
      if (pageYOffset >= (sectionTop - 250)) {
        current = section.getAttribute('id');
      }
    });
    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href').includes(current)) {
        link.classList.add('active');
      }
    });
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
</script>

</body>
</html>
