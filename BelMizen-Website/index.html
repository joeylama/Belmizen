<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bel Mizen | بالميزان</title>

  <style>
    :root {
      --bg-black: #000000; 
      --primary-gold: #cf9b16; 
      --whatsapp-green: #25D366;
      --glass-surface: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-black);
      color: white;
      line-height: 1.6;
      overflow-x: hidden;
    }

    #progressBar {
      position: fixed;
      top: 0; left: 0; width: 0%; height: 4px;
      background: linear-gradient(to right, var(--primary-gold), #ffffff);
      z-index: 2000;
      transition: width 0.1s ease-out;
    }

    header {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(207, 155, 22, 0.2);
    }

    nav { max-width: 1200px; margin: auto; display: flex; justify-content: center; }
    .menu { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; }
    
    .menu a { 
      font-weight: bold; 
      font-size: 0.9rem; 
      text-decoration: none; 
      color: #ffffff; 
      transition: 0.3s; 
      text-transform: uppercase;
      position: relative;
    }

    .menu a::after {
      content: '';
      position: absolute;
      width: 0; height: 2px;
      bottom: -5px; left: 0;
      background: var(--primary-gold);
      transition: width 0.3s ease;
    }
    .menu a:hover::after { width: 100%; }
    .menu a:hover { color: var(--primary-gold); }

    .wa-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--whatsapp-green);
      color: white !important;
      padding: 8px 18px;
      border-radius: 50px;
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }

    /* EYE-CATCHER: Banner Sparkle & Sway */
    .top-banner {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      padding: 60px 0;
      overflow: hidden;
    }
    .top-banner img {
      width: 75%;
      height: auto;
      display: block;
      border-radius: 15px;
      /* Sway and Glow combined */
      animation: bannerSway 5s ease-in-out infinite, sparkleGlow 3s ease-in-out infinite;
      transition: transform 0.5s ease;
    }

    @keyframes bannerSway {
      0%, 100% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
    }

    @keyframes sparkleGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(207, 155, 22, 0.3)); }
      50% { filter: drop-shadow(0 0 30px rgba(207, 155, 22, 0.7)) brightness(1.1); }
    }

    .top-banner img:hover {
      animation-play-state: paused;
      transform: scale(1.02);
      filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
    }

    section { padding: 80px 20px; max-width: 1100px; margin: auto; }
    .section-title { 
      text-align: center; 
      margin-bottom: 40px; 
      font-size: 2.5rem; 
      text-transform: uppercase; 
      color: var(--primary-gold); 
      letter-spacing: 4px; 
    }

    /* Swaying Social Icons */
    .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .social-card {
      background: var(--glass-surface);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      transition: all 0.5s ease;
      border: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      color: white;
      backdrop-filter: blur(5px);
      animation: iconSway 4s ease-in-out infinite;
    }

    @keyframes iconSway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(6px); }
    }

    .social-card:hover {
      animation-play-state: paused;
      border-color: var(--primary-gold);
      box-shadow: 0 0 25px rgba(207, 155, 22, 0.3);
      transform: translateY(-10px);
      background: rgba(207, 155, 22, 0.05);
    }

    .map-container { 
      width: 100%; height: 450px; 
      border-radius: 25px; 
      overflow: hidden; 
      border: 1px solid var(--primary-gold);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .wa-float {
      position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
      background: var(--whatsapp-green); border-radius: 50%; display: flex; 
      justify-content: center; align-items: center; z-index: 2000;
      transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .wa-float:hover { transform: scale(1.1) rotate(10deg); }

    footer { 
      padding: 60px 20px; 
      text-align: center; 
      background: #050505; 
      color: white; 
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) { .top-banner img { width: 95%; } }
  </style>
</head>

<script>
  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById('progressBar').style.width = (winScroll / height) * 100 + "%";
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
</script>
